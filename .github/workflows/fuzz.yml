name: Fuzz

# Daily fuzz run for the cargo-fuzz harnesses under fuzz/. Splits the
# 30-minute total budget across the 3 targets (~10 min each). The
# `ffmpeg_oracle_decode` harness dlopens libavcodec at runtime via
# libloading; the CI runner needs `ffmpeg` (which provides
# libavcodec.so.*) so it actually validates against the reference
# decoder instead of silently skipping.

on:
  schedule:
    - cron: "47 6 * * *"   # daily 06:47 UTC, jittered off the hour
  workflow_dispatch:

jobs:
  fuzz:
    uses: OxideAV/.github/.github/workflows/crate-fuzz.yml@master
    with:
      extra_packages_apt: "ffmpeg"
      time_budget_seconds: 1800
    secrets: inherit
